<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ungültiger Link</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 600px; margin-top: 80px;">
        <div class="card shadow-sm border-0 text-center p-5">
            <div class="mb-4">
                <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 4rem;"></i>
            </div>
            <h2 class="mb-3">Ungültiger Link</h2>
            <p class="text-muted mb-4">
                Dieser Freigabe-Link ist ungültig oder abgelaufen.
                Bitte überprüfen Sie den Link aus Ihrer E-Mail oder wenden Sie sich an den Absender.
            </p>
            <div class="alert alert-warning">
                <i class="bi bi-info-circle"></i> Falls Sie Fragen haben, antworten Sie bitte direkt auf die E-Mail mit dem Angebot.
            </div>
        </div>
    </div>
</body>
</html>
