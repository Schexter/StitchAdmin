{% extends "base.html" %}
{% block title %}Über uns bearbeiten{% endblock %}
{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0"><i class="bi bi-info-circle me-2"></i>Über uns</h2>
        <a href="{{ url_for('website_admin.dashboard') }}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Zurück</a>
    </div>

    <form method="POST" enctype="multipart/form-data">
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Titel</label>
                            <input type="text" class="form-control" name="title" value="{{ content.get('title', 'Qualität aus Leidenschaft') }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Text</label>
                            <textarea class="form-control" name="text" rows="4">{{ content.get('text', '') }}</textarea>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white"><h6 class="mb-0">Checkliste</h6></div>
                    <div class="card-body">
                        {% for i in range(1, 7) %}
                        <div class="mb-2">
                            <div class="input-group input-group-sm">
                                <span class="input-group-text"><i class="bi bi-check-circle-fill text-success"></i></span>
                                <input type="text" class="form-control" name="checklist_{{ i }}"
                                       value="{{ content.get('checklist_%d' % i, '') }}" placeholder="Punkt {{ i }} (leer = nicht angezeigt)">
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white"><h6 class="mb-0">Bild</h6></div>
                    <div class="card-body">
                        {% set img = content.get('image') %}
                        {% if img %}
                        <img src="{% if img.startswith('http') %}{{ img }}{% else %}{{ url_for('static', filename=img) }}{% endif %}"
                             class="img-fluid rounded mb-3" alt="Über uns">
                        {% endif %}
                        <input type="file" class="form-control" name="image" accept="image/*">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-3"><i class="bi bi-save me-1"></i>Speichern</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
