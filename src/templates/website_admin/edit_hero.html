{% extends "base.html" %}
{% block title %}Hero bearbeiten{% endblock %}
{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0"><i class="bi bi-stars me-2"></i>Hero-Bereich</h2>
        <a href="{{ url_for('website_admin.dashboard') }}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Zurück</a>
    </div>

    <form method="POST" enctype="multipart/form-data">
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Badge-Text</label>
                            <input type="text" class="form-control" name="badge_text" value="{{ content.get('badge_text', 'Professionelle Stickerei') }}" placeholder="z.B. Professionelle Stickerei">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Titel</label>
                            <input type="text" class="form-control" name="title" value="{{ content.get('title', '') }}" placeholder="Hauptüberschrift">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Untertitel</label>
                            <textarea class="form-control" name="subtitle" rows="3" placeholder="Beschreibungstext">{{ content.get('subtitle', '') }}</textarea>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Button-Text</label>
                                <input type="text" class="form-control" name="cta_text" value="{{ content.get('cta_text', 'Anfrage stellen') }}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Button-Link</label>
                                <input type="text" class="form-control" name="cta_link" value="{{ content.get('cta_link', '#kontakt') }}">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white"><h6 class="mb-0">Hintergrundbild</h6></div>
                    <div class="card-body">
                        {% if content.get('bg_image') %}
                        <img src="{% if content.bg_image.startswith('http') %}{{ content.bg_image }}{% else %}{{ url_for('static', filename=content.bg_image) }}{% endif %}"
                             class="img-fluid rounded mb-3" alt="Aktuelles Hintergrundbild">
                        {% endif %}
                        <input type="file" class="form-control" name="bg_image" accept="image/*">
                        <small class="text-muted">Empfohlen: 1920x1080px, JPG/PNG</small>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-3"><i class="bi bi-save me-1"></i>Speichern</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
