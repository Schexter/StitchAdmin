{% extends "base.html" %}
{% block title %}SEO & Footer{% endblock %}
{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0"><i class="bi bi-search me-2"></i>SEO & Footer</h2>
        <a href="{{ url_for('website_admin.dashboard') }}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Zurück</a>
    </div>

    <form method="POST">
        <div class="row g-4">
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white"><h6 class="mb-0">SEO / Meta-Tags</h6></div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Seitentitel</label>
                            <input type="text" class="form-control" name="seo_title" value="{{ content.get('seo_title', '') }}" placeholder="Wird im Browser-Tab angezeigt">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Meta-Beschreibung</label>
                            <textarea class="form-control" name="meta_description" rows="3" placeholder="Für Suchmaschinen (max. 160 Zeichen)">{{ content.get('meta_description', '') }}</textarea>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white"><h6 class="mb-0">Footer-Links</h6></div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Impressum-Text</label>
                            <textarea class="form-control" name="impressum_link" rows="4" placeholder="Impressum-Inhalt (wird auf /impressum angezeigt)">{{ content.get('impressum_link', '') }}</textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Datenschutz-Text</label>
                            <textarea class="form-control" name="datenschutz_link" rows="4" placeholder="Datenschutzerklärung (wird auf /datenschutz angezeigt)">{{ content.get('datenschutz_link', '') }}</textarea>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="mt-4">
            <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Speichern</button>
        </div>
    </form>
</div>
{% endblock %}
