<!-- Artikel-Such-Modal mit Smart-Filtern -->
<div class="modal fade" id="articleSearchModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-search"></i> Artikel suchen</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <!-- Suchfeld -->
                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control" id="articleSearchInput"
                               placeholder="Artikelnummer, Name, Farbe, Größe..."
                               autocomplete="off">
                        <button class="btn btn-outline-secondary" type="button" onclick="clearArticleSearch()">
                            <i class="bi bi-x"></i>
                        </button>
                    </div>
                    <small class="text-muted">Mindestens 2 Zeichen eingeben</small>
                </div>

                <!-- Dynamische Filter -->
                <div class="row mb-3 g-2" id="articleModalFilters">
                    <div class="col-md-3">
                        <select class="form-select form-select-sm" id="articleBrandFilter">
                            <option value="">Marke</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select class="form-select form-select-sm" id="articleCategoryFilter">
                            <option value="">Kategorie</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select class="form-select form-select-sm" id="articleSupplierFilter">
                            <option value="">Lieferant</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <div class="form-check form-switch mt-1">
                            <input class="form-check-input" type="checkbox" id="onlyAvailableFilter" checked>
                            <label class="form-check-label small" for="onlyAvailableFilter">Nur vorrätig</label>
                        </div>
                    </div>
                </div>

                <!-- Suchergebnisse -->
                <div id="searchResults">
                    <div class="text-center text-muted py-4">
                        <i class="bi bi-inbox" style="font-size: 3rem;"></i>
                        <p>Geben Sie einen Suchbegriff ein</p>
                    </div>
                </div>

                <!-- Ladeindikator -->
                <div id="searchLoading" class="text-center py-4 d-none">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Lade...</span>
                    </div>
                    <p class="mt-2">Suche läuft...</p>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Schließen</button>
            </div>
        </div>
    </div>
</div>

<style>
.article-result-item {
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
}

.article-result-item:hover {
    background-color: #f8f9fa;
    border-color: #0d6efd;
    transform: translateY(-2px);
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

.article-badge {
    font-size: 0.75rem;
    padding: 0.25rem 0.5rem;
}
</style>

<script>
let articleSearchTimeout = null;
let currentTargetSelect = null;
let _modalFilterOptionsLoaded = false;

function openArticleSearchModal(selectElement) {
    currentTargetSelect = selectElement;
    const modal = new bootstrap.Modal(document.getElementById('articleSearchModal'));
    modal.show();

    // Filter-Optionen einmalig laden
    if (!_modalFilterOptionsLoaded) {
        loadModalFilterOptions();
    }

    setTimeout(() => {
        document.getElementById('articleSearchInput').focus();
    }, 500);
}

function loadModalFilterOptions() {
    fetch('/articles/api/filter-options', {credentials: 'same-origin'})
        .then(r => r.json())
        .then(data => {
            _modalFilterOptionsLoaded = true;

            // Marken befuellen
            const brandSel = document.getElementById('articleBrandFilter');
            if (data.brands && data.brands.length) {
                data.brands.forEach(b => {
                    const name = typeof b === 'string' ? b : b.name;
                    const val = typeof b === 'string' ? b : (b.id || b.name);
                    const opt = new Option(name, val);
                    brandSel.appendChild(opt);
                });
            }

            // Kategorien befuellen
            const catSel = document.getElementById('articleCategoryFilter');
            if (data.categories && data.categories.length) {
                data.categories.forEach(c => {
                    const name = typeof c === 'string' ? c : c.name;
                    const val = typeof c === 'string' ? c : (c.id || c.name);
                    const opt = new Option(name, val);
                    catSel.appendChild(opt);
                });
            }

            // Lieferanten befuellen
            const supSel = document.getElementById('articleSupplierFilter');
            if (data.suppliers && data.suppliers.length) {
                data.suppliers.forEach(s => {
                    const name = typeof s === 'string' ? s : s.name;
                    supSel.appendChild(new Option(name, name));
                });
            }
        })
        .catch(err => console.error('Filter-Optionen laden fehlgeschlagen:', err));
}

function clearArticleSearch() {
    document.getElementById('articleSearchInput').value = '';
    document.getElementById('searchResults').innerHTML = `
        <div class="text-center text-muted py-4">
            <i class="bi bi-inbox" style="font-size: 3rem;"></i>
            <p>Geben Sie einen Suchbegriff ein</p>
        </div>
    `;
}

function searchArticles() {
    const searchTerm = document.getElementById('articleSearchInput').value;
    const brand = document.getElementById('articleBrandFilter').value;
    const category = document.getElementById('articleCategoryFilter').value;
    const supplier = document.getElementById('articleSupplierFilter').value;
    const onlyAvailable = document.getElementById('onlyAvailableFilter').checked;

    if (searchTerm.length < 2) {
        document.getElementById('searchResults').innerHTML = `
            <div class="text-center text-muted py-4">
                <i class="bi bi-info-circle" style="font-size: 2rem;"></i>
                <p>Bitte mindestens 2 Zeichen eingeben</p>
            </div>
        `;
        return;
    }

    document.getElementById('searchLoading').classList.remove('d-none');
    document.getElementById('searchResults').innerHTML = '';

    const params = new URLSearchParams({q: searchTerm, limit: 50});
    if (brand) {
        // Pruefen ob es eine ID (Zahl) oder ein String ist
        if (!isNaN(brand)) params.append('brand_id', brand);
        else params.append('brand', brand);
    }
    if (category) {
        if (!isNaN(category)) params.append('category_id', category);
        else params.append('category', category);
    }
    if (supplier) params.append('supplier', supplier);
    if (onlyAvailable) params.append('stock', 'available');

    fetch('/articles/api/search?' + params, {credentials: 'same-origin'})
        .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(data => {
            document.getElementById('searchLoading').classList.add('d-none');
            const articles = data.articles || data;

            if (!articles.length) {
                document.getElementById('searchResults').innerHTML = `
                    <div class="alert alert-info">
                        <i class="bi bi-info-circle"></i> Keine Artikel gefunden für "${escapeHtml(searchTerm)}"
                    </div>
                `;
                return;
            }

            let html = '<div class="list-group" id="articleSearchResults">';
            articles.forEach(article => {
                const stockBadge = article.stock > 10
                    ? `<span class="badge bg-success article-badge">Verfügbar</span>`
                    : article.stock > 0
                    ? `<span class="badge bg-warning article-badge">Wenig Lager</span>`
                    : `<span class="badge bg-danger article-badge">Nicht lagernd</span>`;

                html += `
                    <div class="article-result-item"
                         data-article-id="${article.id}"
                         data-article-name="${escapeHtml(article.name)}"
                         data-article-price="${article.price}"
                         data-article-color="${escapeHtml(article.color || '')}"
                         data-article-size="${escapeHtml(article.size || '')}"
                         data-article-material="${escapeHtml(article.material || '')}"
                         data-article-weight="${article.weight || 0.5}">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="flex-grow-1">
                                <h6 class="mb-1">${escapeHtml(article.name)}</h6>
                                <p class="mb-1 text-muted small">
                                    <strong>Art-Nr:</strong> ${escapeHtml(article.article_number || 'N/A')}
                                    ${article.brand ? ` | <strong>Marke:</strong> ${escapeHtml(article.brand)}` : ''}
                                    ${article.color ? ` | <strong>Farbe:</strong> ${escapeHtml(article.color)}` : ''}
                                    ${article.size ? ` | <strong>Größe:</strong> ${escapeHtml(article.size)}` : ''}
                                </p>
                                ${article.material ? `<p class="mb-0 text-muted small"><strong>Material:</strong> ${escapeHtml(article.material)}</p>` : ''}
                            </div>
                            <div class="text-end ms-3">
                                <div class="fw-bold">${formatPrice(article.price)} €</div>
                                ${stockBadge}
                            </div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            html += `<div class="text-muted text-center mt-3 small">${articles.length} von ${data.total || articles.length} Artikel(n)</div>`;

            document.getElementById('searchResults').innerHTML = html;

            document.querySelectorAll('.article-result-item').forEach(item => {
                item.addEventListener('click', function() {
                    selectArticle(
                        this.dataset.articleId, this.dataset.articleName,
                        parseFloat(this.dataset.articlePrice),
                        this.dataset.articleColor, this.dataset.articleSize,
                        this.dataset.articleMaterial, parseFloat(this.dataset.articleWeight)
                    );
                });
            });
        })
        .catch(error => {
            console.error('Suchfehler:', error);
            document.getElementById('searchLoading').classList.add('d-none');
            document.getElementById('searchResults').innerHTML = `
                <div class="alert alert-danger">
                    <i class="bi bi-exclamation-triangle"></i> Fehler bei der Suche
                </div>
            `;
        });
}

function selectArticle(articleId, articleName, articlePrice, articleColor, articleSize, articleMaterial, articleWeight) {
    if (!currentTargetSelect) {
        console.error('Kein Ziel-Select definiert');
        return;
    }

    articleColor = articleColor || '';
    articleSize = articleSize || '';
    articleMaterial = articleMaterial || '';
    articleWeight = articleWeight || 0.5;

    let optionExists = false;
    for (let i = 0; i < currentTargetSelect.options.length; i++) {
        if (currentTargetSelect.options[i].value == articleId) {
            optionExists = true;
            break;
        }
    }

    if (!optionExists) {
        const newOption = document.createElement('option');
        newOption.value = articleId;
        let displayText = `${articleName} - ${formatPrice(articlePrice)}€`;
        if (articleColor) displayText += ` (${articleColor})`;
        if (articleSize) displayText += ` - ${articleSize}`;
        newOption.textContent = displayText;
        newOption.setAttribute('data-name', articleName);
        newOption.setAttribute('data-price', articlePrice);
        newOption.setAttribute('data-weight', articleWeight);
        newOption.setAttribute('data-color', articleColor);
        newOption.setAttribute('data-size', articleSize);
        newOption.setAttribute('data-material', articleMaterial);
        currentTargetSelect.appendChild(newOption);
    }

    currentTargetSelect.value = articleId;
    const event = new Event('change', { bubbles: true });
    currentTargetSelect.dispatchEvent(event);

    const modal = bootstrap.Modal.getInstance(document.getElementById('articleSearchModal'));
    modal.hide();
    showToast('Artikel ausgewählt', `${articleName} wurde ausgewählt`);
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatPrice(price) {
    return parseFloat(price).toFixed(2);
}

function showToast(title, message) {
    const container = document.createElement('div');
    container.innerHTML = `
        <div class="toast position-fixed bottom-0 end-0 m-3" role="alert" style="z-index: 9999;">
            <div class="toast-header">
                <i class="bi bi-check-circle text-success me-2"></i>
                <strong class="me-auto">${escapeHtml(title)}</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body">${escapeHtml(message)}</div>
        </div>
    `;
    document.body.appendChild(container);
    const toastEl = container.querySelector('.toast');
    const toast = new bootstrap.Toast(toastEl, { delay: 3000 });
    toast.show();
    toastEl.addEventListener('hidden.bs.toast', () => container.remove());
}

// Event-Listener
document.addEventListener('DOMContentLoaded', function() {
    const searchInput = document.getElementById('articleSearchInput');
    if (searchInput) {
        searchInput.addEventListener('input', function() {
            clearTimeout(articleSearchTimeout);
            articleSearchTimeout = setTimeout(searchArticles, 400);
        });
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                clearTimeout(articleSearchTimeout);
                searchArticles();
            }
        });
    }

    // Filter-Aenderungen loesen neue Suche aus
    ['articleBrandFilter', 'articleCategoryFilter', 'articleSupplierFilter', 'onlyAvailableFilter'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('change', function() {
            if (document.getElementById('articleSearchInput').value.length >= 2) searchArticles();
        });
    });
});
</script>
